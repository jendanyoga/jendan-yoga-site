<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Your Password | JenDan Yoga</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #2f2f35;
      background: linear-gradient(180deg, #f4efff 0%, #ffffff 100%);
      min-height: 100vh;
    }

    .topbar {
      background: linear-gradient(180deg, #f4efff 0%, #ffffff 100%);
      padding: 24px 20px 10px;
      text-align: center;
    }

    .logo {
      width: 220px;
      max-width: 55vw;
      display: block;
      margin: 0 auto 8px;
    }

    .tagline {
      color: #8e74be;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0;
    }

    .wrap {
      max-width: 520px;
      margin: 28px auto 60px;
      padding: 0 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 16px 38px rgba(87, 64, 124, 0.14);
      padding: 34px 28px 30px;
      border: 1px solid rgba(142, 116, 190, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.08;
      color: #2f2f35;
      text-align: center;
    }

    .subtext {
      margin: 0 0 28px;
      text-align: center;
      color: #666674;
      line-height: 1.6;
      font-size: 16px;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 0 0 8px;
      color: #4a4063;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 14px;
      border: 1px solid #d7cdea;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      margin-bottom: 18px;
    }

    input:focus {
      border-color: #8e74be;
      box-shadow: 0 0 0 4px rgba(142, 116, 190, 0.14);
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(90deg, #8e74be 0%, #6ccf8d 100%);
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    .button:hover {
      opacity: 0.96;
    }

    .button:active {
      transform: scale(0.99);
    }

    .button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 18px;
      text-align: center;
      font-size: 15px;
      line-height: 1.5;
      min-height: 24px;
      color: #4a4063;
    }

    .success {
      color: #1f8b50;
      font-weight: 700;
    }

    .error {
      color: #c53939;
      font-weight: 700;
    }

    .footer-note {
      margin-top: 22px;
      text-align: center;
      color: #888896;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 28px;
      }

      .card {
        padding: 26px 20px 24px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <img src="/logo.png" alt="JenDan Yoga Logo" class="logo">
    <p class="tagline">A Conscious Somatic Energy Flow</p>
  </div>

  <div class="wrap">
    <div class="card">
      <h1>Create Your Password</h1>
      <p class="subtext">
        Welcome to JenDan Yoga. Create your password below to activate your member portal access.
      </p>

      <label for="password">New Password</label>
      <input type="password" id="password" placeholder="Enter your new password">

      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter your new password">

      <button id="createPasswordButton" class="button" onclick="setPassword()">Create Password</button>

      <div id="message" class="message"></div>

      <div class="footer-note">
        After your password is created, you can return to the JenDan Yoga login page and enter the member portal.
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://bdiyolgyhbwtejkxpcpx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_sgsZNCUzcuF4IUx9cnqySw_GYu910kd";

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showMessage(text, type = "") {
      const message = document.getElementById("message");
      message.className = "message";
      if (type) {
        message.classList.add(type);
      }
      message.innerText = text;
    }

    function setButtonDisabled(disabled) {
      document.getElementById("createPasswordButton").disabled = disabled;
    }

    async function initializeAuth() {
      showMessage("");
      setButtonDisabled(true);

      try {
        const url = new URL(window.location.href);
        const hash = window.location.hash.startsWith("#")
          ? window.location.hash.substring(1)
          : window.location.hash;

        const hashParams = new URLSearchParams(hash);
        const accessToken = hashParams.get("access_token");
        const refreshToken = hashParams.get("refresh_token");
        const type = hashParams.get("type");
        const errorDescription = hashParams.get("error_description");
        const code = url.searchParams.get("code");

        if (errorDescription) {
          showMessage(decodeURIComponent(errorDescription), "error");
          return;
        }

        if (code) {
          const { error } = await sb.auth.exchangeCodeForSession(code);

          if (error) {
            showMessage("This password link is invalid or expired. Please request a new one.", "error");
            return;
          }
        } else if (accessToken && refreshToken) {
          const { error } = await sb.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });

          if (error) {
            showMessage("This password link is invalid or expired. Please request a new one.", "error");
            return;
          }
        }

        const { data, error } = await sb.auth.getSession();

        if (error || !data.session) {
          showMessage("This password link is invalid, expired, or missing a login session.", "error");
          return;
        }

        if (type && type !== "recovery" && type !== "invite") {
          showMessage("This password link is not valid for password setup.", "error");
          return;
        }

        window.history.replaceState({}, document.title, url.pathname);
        setButtonDisabled(false);
      } catch (err) {
        showMessage("Unable to verify your password link. Please request a new one.", "error");
      }
    }

    async function setPassword() {
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      showMessage("");

      if (!password || !confirmPassword) {
        showMessage("Please fill out both password fields.", "error");
        return;
      }

      if (password.length < 6) {
        showMessage("Your password must be at least 6 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("Your passwords do not match.", "error");
        return;
      }

      const { data: sessionData, error: sessionError } = await sb.auth.getSession();

      if (sessionError || !sessionData.session) {
        showMessage("Your password link is invalid or expired. Please request a new one.", "error");
        return;
      }

      const { error } = await sb.auth.updateUser({
        password: password
      });

      if (error) {
        showMessage(error.message, "error");
      } else {
        showMessage("Password created successfully. You can now log in.", "success");

        setTimeout(() => {
          window.location.href = "/login";
        }, 2000);
      }
    }

    window.addEventListener("load", initializeAuth);
  </script>

</body>
</html>
